services:
  - type: web
    name: ai-quiz-app
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app" # This stays the same if you set Root to 'backend'
    envVars:
      - key: FLASK_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: quiz-db
          property: connectionString

databases:
  - name: quiz-db
    plan: free